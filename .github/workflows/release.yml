name: Build & attach release ZIP

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify plugin version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          HEADER=$(grep -E '^\s*\*\s*Version:' swinog-events.php | head -n1 | awk -F: '{print $2}' | xargs)
          CONST=$(grep -E "define\(\s*'STGL_SWINOG_VERSION'" swinog-events.php | sed -E "s/.*'([0-9.]+)'.*/\1/")
          echo "tag=$TAG header=$HEADER const=$CONST"
          if [ "$TAG" != "$HEADER" ] || [ "$TAG" != "$CONST" ]; then
            echo "::error::Tag ($TAG) does not match plugin Version header ($HEADER) or STGL_SWINOG_VERSION ($CONST)"
            exit 1
          fi

      - name: Build plugin ZIP
        run: |
          SLUG=swinog-events
          STAGE="$RUNNER_TEMP/$SLUG"
          mkdir -p "$STAGE"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.editorconfig' \
            --exclude='.DS_Store' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='MIGRATION.md' \
            --exclude='*.zip' \
            ./ "$STAGE/"
          cd "$RUNNER_TEMP"
          zip -r "$GITHUB_WORKSPACE/$SLUG.zip" "$SLUG"

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: swinog-events.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
